name: SOLR ETL Pipelines

on:
  schedule:
    - cron: '30 9 * * 5' # Fridays at 09:30 UTC
  workflow_dispatch: 

env:
  python_backend_env: prod
  solr_prod_url: ${{ secrets.SOLR_PROD_URL }} # Standard practice: use UPPERCASE for secrets

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Code Directory'
        uses: actions/checkout@v4

      - name: 'Set up Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.6'
          cache: 'pip' # Caches dependencies for faster runs

      - name: 'Install dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 'Run Raw Ingestion Task'
        run: python DAG_raw_pubMed.py

      - name: 'Run Clean Transfer/Load Task'
        run: python DAG_clean_migration.py
